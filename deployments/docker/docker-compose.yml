version: "3.8"

services:
  api:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    container_name: summarizer-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - ENVIRONMENT=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=meeting_summarizer
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NATS_URL=nats://nats:4222
      - KAFKA_URL=kafka:9092
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - summarizer-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: summarizer-postgres
    environment:
      - POSTGRES_DB=meeting_summarizer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summarizer-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: summarizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - summarizer-network
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: summarizer-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - summarizer-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: summarizer-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - summarizer-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: summarizer-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - summarizer-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: summarizer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - summarizer-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: summarizer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - summarizer-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: summarizer-jaeger
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "14268:14268"
    networks:
      - summarizer-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  ollama-data:
  prometheus-data:

networks:
  summarizer-network:
    driver: bridge
